<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dt208g_lab1</title>
</head>

<body>
  <div class="container">
    <main>
      <div class="content">
        <h1>Kurser</h1>
        <form id="course-form" autocomplete="off">
          <h2>Lägg till kurs</h2>
          <label for="kurskod">Kurskod</label>
          <input id="kurskod" name="kurskod" type="text" required>

          <label for="kursnamn">Kursnamn</label>
          <input id="kursnamn" name="kursnamn" type="text" required>

          <label for="progression">Progression</label>
          <select name="progression" id="profression" required>
            <option value=""></option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>

          <label for="syllabus">URL till kursplanen</label>
          <input id="syllabus" name="syllabus" type="text" required>

          <button id="submit-btn" type="submit">Spara</button>
        </form>

        <ul id="course-list" class="hidden"></ul>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
