<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dt208g_lab1</title>
</head>

<body>
  <div class="container">
    <main>
      <div class="content">
        <h1>Spara dina kurser i en lista!</h1>
        <form id="course-form" autocomplete="off">
          <h2>Lägg till kurs</h2>
          <label for="course-code">Kurskod</label>
          <input id="course-code" name="course-code" type="text" required>

          <label for="course-name">Kursnamn</label>
          <input id="course-name" name="course-name" type="text" required>

          <label for="progression">Progression</label>
          <select name="progression" id="progression" required>
            <option value="" disabled selected>Välj</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>

          <label for="syllabus">URL till kursplan</label>
          <input id="syllabus" name="syllabus" type="text" required>

          <button id="submit-btn" type="submit">Spara</button>
          <p id="error-message" class="hidden"></p>
        </form>

        <div id="course-list-container" class="hidden">
          <h2 id="course-list-heading">Sparade kurser</h2>
          <ul id="course-list"></ul>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
